!
no enable password
no aaa root
!
username admin privilege 15 role network-admin secret sha512 $6$df66f7b9dbc825eb$acdKGB4JELAN/TFojlq2X21Z4JFGgIeN3H85yfzAnVHc4LeaTuPVF/7a6XLglOpDZqE7wlJg2VwFtCPDUxiA51
username arista privilege 15 role network-admin secret sha512 $6$Enl0WfE32FthwyiJ$yTyGaEJ2uPKLU.F7314YtB7J1jrzrMi7ogXIRTEHQfLdLgKWWmr1UvNlZLN6AyuxET7G5aH3AI9OYRzxVTkB1.
!
daemon TerminAttr
   exec /usr/bin/TerminAttr -cvaddr=192.168.1.12:9910 -cvauth=token,/tmp/token -cvvrf=MGMT -disableaaa -smashexcludes=ale,flexCounter,hardware,kni,pulse,strata -taillogs -cvsourceintf=Management0
   no shutdown
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname xdc1-leaf-03
ip domain lookup vrf MGMT source-interface Management0
ip name-server vrf MGMT 8.8.8.8
!
spanning-tree mode mstp
spanning-tree mst 0 priority 4096
!
vlan 10
   name vlan10
!
vlan 11
   name vlan11
!
vlan 12
   name vlan12
!
vlan 3401
   name L2_VLAN3401
!
vrf instance DC
!
vrf instance MGMT
!
interface Ethernet1
   description P2P_xdc1-spine-01_Ethernet3
   no shutdown
   mtu 1500
   no switchport
   ip address 10.255.255.9/31
!
interface Ethernet2
   description P2P_xdc1-spine-02_Ethernet3
   no shutdown
   mtu 1500
   no switchport
   ip address 10.255.255.11/31
!
interface Ethernet5
   description SERVER_server4_PCI1
   no shutdown
   switchport trunk native vlan 4092
   switchport trunk allowed vlan 11-12
   switchport mode trunk
   switchport
   spanning-tree portfast
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.255.0.5/32
!
interface Loopback1
   description VXLAN_TUNNEL_SOURCE
   no shutdown
   ip address 10.255.1.5/32
!
interface Loopback10
   description DIAG_VRF_DC
   no shutdown
   vrf DC
   ip address 10.255.10.5/32
!
interface Management0
   description OOB_MANAGEMENT
   no shutdown
   vrf MGMT
   ip address 192.168.154.11/24
!
interface Vlan10
   description vlan10
   no shutdown
   vrf DC
   ip address virtual 10.10.10.1/24
!
interface Vlan11
   description vlan11
   no shutdown
   vrf DC
   ip address virtual 10.10.11.1/24
!
interface Vlan12
   description vlan12
   no shutdown
   vrf DC
   ip address virtual 10.10.12.1/24
!
interface Vxlan1
   description xdc1-leaf-03_VTEP
   vxlan source-interface Loopback1
   vxlan udp-port 4789
   vxlan vlan 10 vni 10010
   vxlan vlan 11 vni 10011
   vxlan vlan 12 vni 10012
   vxlan vlan 3401 vni 13401
   vxlan vrf DC vni 40001
!
ip virtual-router mac-address 00:1c:73:00:00:99
!
ip address virtual source-nat vrf DC address 10.255.10.5
!
ip routing
ip routing vrf DC
no ip routing vrf MGMT
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 10.255.0.0/27 eq 32
   seq 20 permit 10.255.1.0/27 eq 32
!
ntp local-interface vrf MGMT Management0
ntp server vrf MGMT 0.pool.ntp.org prefer
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
!
router bfd
   multihop interval 300 min-rx 300 multiplier 3
!
router bgp 65103
   router-id 10.255.0.5
   no bgp default ipv4-unicast
   maximum-paths 4
   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS bfd
   neighbor EVPN-OVERLAY-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-PEERS password 7 Q4fqtbqcZ7oQuKfuWtNGRQ==
   neighbor EVPN-OVERLAY-PEERS send-community
   neighbor EVPN-OVERLAY-PEERS maximum-routes 0
   neighbor IPv4-UNDERLAY-PEERS peer group
   neighbor IPv4-UNDERLAY-PEERS password 7 7x4B4rnJhZB438m9+BrBfQ==
   neighbor IPv4-UNDERLAY-PEERS send-community
   neighbor IPv4-UNDERLAY-PEERS maximum-routes 256000
   neighbor 10.255.0.1 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.0.1 remote-as 65100
   neighbor 10.255.0.1 description xdc1-spine-01_Loopback0
   neighbor 10.255.0.2 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.0.2 remote-as 65100
   neighbor 10.255.0.2 description xdc1-spine-02_Loopback0
   neighbor 10.255.255.8 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.255.255.8 remote-as 65100
   neighbor 10.255.255.8 description xdc1-spine-01_Ethernet3
   neighbor 10.255.255.10 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.255.255.10 remote-as 65100
   neighbor 10.255.255.10 description xdc1-spine-02_Ethernet3
   redistribute connected route-map RM-CONN-2-BGP
   !
   vlan 10
      rd 10.255.0.5:10010
      route-target both 10010:10010
      redistribute learned
   !
   vlan 11
      rd 10.255.0.5:10011
      route-target both 10011:10011
      redistribute learned
   !
   vlan 12
      rd 10.255.0.5:10012
      route-target both 10012:10012
      redistribute learned
   !
   vlan 3401
      rd 10.255.0.5:13401
      route-target both 13401:13401
      redistribute learned
   !
   address-family evpn
      neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv4
      no neighbor EVPN-OVERLAY-PEERS activate
      neighbor IPv4-UNDERLAY-PEERS activate
   !
   vrf DC
      rd 10.255.0.5:40001
      route-target import evpn 40001:40001
      route-target export evpn 40001:40001
      router-id 10.255.0.5
      redistribute connected
!
end
